version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: material_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-MaterialMgmt2026!}
      MYSQL_DATABASE: material_mgmt
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: material_app
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_ROOT_PASSWORD:-MaterialMgmt2026!}@db:3306/material_mgmt?charset=utf8mb4
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-please}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/backend/uploads

volumes:
  mysql_data:
  uploads_data:
