<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zachary · 耗材管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #1F4E79;
  --primary-light: #2E75B6;
  --primary-lighter: #E8F0F8;
  --primary-bg: #F0F5FA;
  --success: #27AE60;
  --success-bg: #E8F8EF;
  --warning: #F39C12;
  --warning-bg: #FEF9E7;
  --danger: #E74C3C;
  --danger-bg: #FDEDEC;
  --info: #3498DB;
  --bg: #F4F6F9;
  --card: #FFFFFF;
  --text: #2C3E50;
  --text-light: #7F8C8D;
  --text-lighter: #BDC3C7;
  --border: #E1E8ED;
  --sidebar-w: 240px;
  --header-h: 56px;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
  --transition: .2s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--text); line-height:1.6; overflow-x:hidden; }
a { text-decoration:none; color:inherit; }

/* ─── Login ─── */
.login-overlay {
  position:fixed; inset:0; background:linear-gradient(135deg, #1a3a5c 0%, #1F4E79 50%, #2E75B6 100%);
  display:flex; align-items:center; justify-content:center; z-index:9999;
  transition:opacity .4s, visibility .4s;
}
.login-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.login-card {
  background:#fff; border-radius:12px; padding:48px 40px; width:400px; max-width:92vw;
  box-shadow:0 20px 60px rgba(0,0,0,.3); text-align:center;
}
.login-card .logo { font-size:28px; font-weight:700; color:var(--primary); margin-bottom:4px; }
.login-card .sub { font-size:13px; color:var(--text-light); margin-bottom:32px; }
.login-card .field { text-align:left; margin-bottom:20px; }
.login-card label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text); }
.login-card input {
  width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:6px;
  font-size:14px; transition:var(--transition); outline:none;
}
.login-card input:focus { border-color:var(--primary-light); box-shadow:0 0 0 3px rgba(46,117,182,.15); }
.login-card .btn {
  width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:6px;
  font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition); margin-top:8px;
}
.login-card .btn:hover { background:var(--primary-light); }
.login-card .hint { margin-top:16px; font-size:12px; color:var(--text-light); }

/* ─── Layout ─── */
.app-layout { display:none; min-height:100vh; }
.app-layout.active { display:flex; }
.sidebar {
  width:var(--sidebar-w); background:var(--primary); color:#fff; position:fixed; top:0; left:0;
  bottom:0; z-index:100; overflow-y:auto; transition:transform var(--transition); display:flex; flex-direction:column;
}
.sidebar-header { padding:20px 20px 24px; border-bottom:1px solid rgba(255,255,255,.1); }
.sidebar-header .brand { font-size:17px; font-weight:700; letter-spacing:.5px; }
.sidebar-header .brand small { display:block; font-size:11px; opacity:.6; font-weight:400; margin-top:2px; }
.sidebar-nav { flex:1; padding:8px 0; }
.nav-section { padding:0 16px; margin-top:12px; }
.nav-section-title { font-size:11px; text-transform:uppercase; opacity:.45; letter-spacing:1px; padding:8px 4px; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:10px 16px; margin:2px 8px; border-radius:6px;
  cursor:pointer; font-size:14px; transition:var(--transition); color:rgba(255,255,255,.75);
}
.nav-item:hover { background:rgba(255,255,255,.1); color:#fff; }
.nav-item.active { background:rgba(255,255,255,.18); color:#fff; font-weight:600; }
.nav-item .icon { width:20px; text-align:center; font-size:15px; }
.nav-item .badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; }
.sidebar-footer { padding:12px 16px; border-top:1px solid rgba(255,255,255,.1); }
.sidebar-footer .user-info { display:flex; align-items:center; gap:10px; padding:8px; border-radius:6px; cursor:pointer; transition:var(--transition); }
.sidebar-footer .user-info:hover { background:rgba(255,255,255,.1); }
.sidebar-footer .avatar { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; }
.sidebar-footer .name { font-size:13px; }
.sidebar-footer .role { font-size:11px; opacity:.6; }

.main-wrap { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }
.topbar {
  height:var(--header-h); background:var(--card); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:50;
}
.topbar .menu-toggle { display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--text); padding:4px; }
.topbar .breadcrumb { font-size:13px; color:var(--text-light); }
.topbar .breadcrumb span { color:var(--text); font-weight:600; }
.topbar .spacer { flex:1; }
.topbar .topbar-action { position:relative; }
.topbar .icon-btn { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-light); padding:6px 8px; border-radius:6px; transition:var(--transition); position:relative; }
.topbar .icon-btn:hover { background:var(--bg); color:var(--text); }
.topbar .dot { position:absolute; top:4px; right:6px; width:8px; height:8px; background:var(--danger); border-radius:50%; border:2px solid #fff; }
.main-content { flex:1; padding:24px; max-width:1400px; }

/* ─── Cards & Stats ─── */
.page { display:none; }
.page.active { display:block; }
.page-title { font-size:22px; font-weight:700; margin-bottom:4px; }
.page-subtitle { font-size:13px; color:var(--text-light); margin-bottom:24px; }
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card {
  background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow);
  display:flex; align-items:center; gap:16px; transition:var(--transition);
}
.stat-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-1px); }
.stat-icon { width:48px; height:48px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.stat-icon.blue { background:#E8F0F8; color:var(--primary); }
.stat-icon.green { background:#E8F8EF; color:var(--success); }
.stat-icon.orange { background:#FEF9E7; color:var(--warning); }
.stat-icon.red { background:#FDEDEC; color:var(--danger); }
.stat-value { font-size:26px; font-weight:700; }
.stat-label { font-size:12px; color:var(--text-light); margin-top:2px; }

.card {
  background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
}
.card-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.card-header h3 { font-size:15px; font-weight:600; }
.card-body { padding:20px; }
.card-body.no-padding { padding:0; }

/* ─── Charts Row ─── */
.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
.chart-box { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; }
.chart-box h3 { font-size:14px; font-weight:600; margin-bottom:16px; }
.chart-box canvas { max-height:260px; }

/* ─── Tables ─── */
.mat-select-wrap { position:relative; }
.mat-select-wrap input { width:100%; padding:8px 10px 8px 32px; border:1px solid var(--border); border-radius:6px 6px 0 0; font-size:13px; }
.mat-select-wrap .search-icon { position:absolute; left:10px; top:10px; font-size:13px; }
.mat-select-wrap select { width:100%; padding:8px 10px; border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; font-size:13px; max-height:200px; background:#fff; }
.mat-select-wrap select option { padding:6px 8px; }

.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th {
  background:#F8FAFB; padding:12px 16px; text-align:left; font-weight:600; color:var(--text-light);
  border-bottom:2px solid var(--border); white-space:nowrap; font-size:12px; text-transform:uppercase; letter-spacing:.3px;
}
tbody td { padding:12px 16px; border-bottom:1px solid var(--border); }
tbody tr:hover { background:var(--primary-bg); }
.badge {
  display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600;
}
.badge-success { background:var(--success-bg); color:var(--success); }
.badge-warning { background:var(--warning-bg); color:var(--warning); }
.badge-danger { background:var(--danger-bg); color:var(--danger); }
.badge-info { background:#E8F4FD; color:var(--info); }
.badge-default { background:#F0F0F0; color:#666; }
.text-danger { color:var(--danger); font-weight:600; }
.text-success { color:var(--success); font-weight:600; }

/* ─── Forms ─── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid.col-3 { grid-template-columns:1fr 1fr 1fr; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:13px; font-weight:600; color:var(--text); }
.form-group label .req { color:var(--danger); margin-left:2px; }
.form-group input, .form-group select, .form-group textarea {
  padding:9px 12px; border:1.5px solid var(--border); border-radius:6px; font-size:13px;
  outline:none; transition:var(--transition); font-family:inherit; background:#fff;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color:var(--primary-light); box-shadow:0 0 0 3px rgba(46,117,182,.1);
}
.form-actions { display:flex; gap:12px; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); }

/* ─── Buttons ─── */
.btn {
  display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:6px;
  font-size:13px; font-weight:600; cursor:pointer; border:none; transition:var(--transition); white-space:nowrap;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-light); }
.btn-outline { background:#fff; color:var(--primary); border:1.5px solid var(--primary); }
.btn-outline:hover { background:var(--primary-lighter); }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { opacity:.9; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { opacity:.9; }
.btn-ghost { background:transparent; color:var(--text-light); }
.btn-ghost:hover { background:var(--bg); color:var(--text); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-xs { padding:4px 8px; font-size:11px; border-radius:4px; }
.btn-group { display:flex; gap:8px; }

/* ─── Search & Filters ─── */
.toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
.toolbar .search-box { position:relative; flex:1; min-width:200px; max-width:360px; }
.toolbar .search-box input {
  width:100%; padding:9px 12px 9px 36px; border:1.5px solid var(--border); border-radius:6px; font-size:13px; outline:none;
}
.toolbar .search-box input:focus { border-color:var(--primary-light); }
.toolbar .search-box .sicon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-lighter); font-size:14px; }
.toolbar select { padding:9px 12px; border:1.5px solid var(--border); border-radius:6px; font-size:13px; outline:none; background:#fff; }

/* ─── Modal ─── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:flex;
  align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:.25s;
}
.modal-overlay.show { opacity:1; visibility:visible; }
.modal {
  background:#fff; border-radius:12px; width:540px; max-width:94vw; max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size:16px; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-light); padding:4px; }
.modal-body { padding:20px; }
.modal-footer { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

/* ─── Toast ─── */
.toast-container { position:fixed; top:20px; right:20px; z-index:300; display:flex; flex-direction:column; gap:8px; }
.toast {
  background:#fff; border-radius:8px; padding:14px 20px; box-shadow:0 8px 24px rgba(0,0,0,.15);
  display:flex; align-items:center; gap:10px; font-size:13px; animation:slideIn .3s ease; min-width:280px;
}
.toast.success { border-left:4px solid var(--success); }
.toast.error { border-left:4px solid var(--danger); }
.toast.warning { border-left:4px solid var(--warning); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* ─── Approval Flow ─── */
.flow-steps { display:flex; align-items:center; gap:0; margin-bottom:24px; padding:0 10px; }
.flow-step { display:flex; align-items:center; gap:8px; }
.flow-dot {
  width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; background:var(--border); color:var(--text-light);
}
.flow-dot.active { background:var(--primary); color:#fff; }
.flow-dot.done { background:var(--success); color:#fff; }
.flow-dot.reject { background:var(--danger); color:#fff; }
.flow-text { font-size:12px; color:var(--text-light); white-space:nowrap; }
.flow-line { flex:1; height:2px; background:var(--border); min-width:30px; margin:0 4px; }
.flow-line.done { background:var(--success); }

/* ─── Pagination ─── */
.pagination { display:flex; gap:4px; justify-content:center; margin-top:20px; }
.pagination button {
  padding:7px 13px; border:1px solid var(--border); background:#fff; border-radius:4px;
  font-size:13px; cursor:pointer; transition:var(--transition);
}
.pagination button:hover { border-color:var(--primary-light); color:var(--primary); }
.pagination button.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* ─── Tabs ─── */
.tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; }
.tab-btn {
  padding:10px 20px; border:none; background:none; font-size:13px; font-weight:600; color:var(--text-light);
  cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:var(--transition);
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ─── Mobile ─── */
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main-wrap { margin-left:0; }
  .topbar .menu-toggle { display:block; }
  .form-grid, .form-grid.col-3 { grid-template-columns:1fr; }
  .charts-row { grid-template-columns:1fr; }
  .stats-row { grid-template-columns:1fr 1fr; }
  .toolbar { flex-direction:column; }
  .toolbar .search-box { max-width:100%; }
  .flow-steps { flex-wrap:wrap; }
  .main-content { padding:16px; }
}
@media (max-width:480px) {
  .stats-row { grid-template-columns:1fr; }
}

/* Sidebar overlay on mobile */
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:99; }
@media (max-width:768px) {
  .sidebar-overlay.show { display:block; }
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="login-overlay" id="loginPage">
  <div class="login-card">
    <div class="logo">📦 耗材管理系统</div>
    <div class="sub">zachary</div>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="请输入工号或用户名" value="admin">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="请输入密码" value="123456">
    </div>
    <button class="btn" onclick="doLogin()">登 录</button>
    <div class="hint">演示账号：admin / teacher / approver — 密码任意</div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div class="app-layout" id="appLayout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">📦 耗材管理系统<small>zachary</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-section-title">主导航</div></div>
      <div class="nav-item active" data-page="dashboard" onclick="navTo('dashboard',this)"><span class="icon">📊</span>工作台</div>
      <div class="nav-item" data-page="inbound" onclick="navTo('inbound',this)"><span class="icon">📥</span>入库登记</div>
      <div class="nav-item" data-page="inventory" onclick="navTo('inventory',this)"><span class="icon">📋</span>库存查询</div>
      <div class="nav-item" data-page="apply" onclick="navTo('apply',this)"><span class="icon">📝</span>领用申请</div>
      <div class="nav-item" data-page="approve" onclick="navTo('approve',this)"><span class="icon">✅</span>审批管理<span class="badge" id="approveBadge" style="display:none">0</span></div>
      <div class="nav-section"><div class="nav-section-title">管理</div></div>
      <div class="nav-item" data-page="supplier" onclick="navTo('supplier',this)"><span class="icon">🏭</span>供应商管理</div>
      <div class="nav-item" data-page="logs" onclick="navTo('logs',this)"><span class="icon">📜</span>操作日志</div>
      <div class="nav-item" data-page="reports" onclick="navTo('reports',this)"><span class="icon">📈</span>报表导出</div>
      <div class="nav-section"><div class="nav-section-title">系统</div></div>
      <div class="nav-item" data-page="settings" onclick="navTo('settings',this)"><span class="icon">⚙️</span>系统设置</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" onclick="navTo('settings')">
        <div class="avatar" style="position:relative;overflow:hidden">
          <img id="sidebarAvatarImg" src="/api/auth/avatar/${state.user?.id}" style="width:100%;height:100%;object-fit:cover;display:none" onerror="this.style.display='none'">
          <div id="sidebarAvatarText">管</div>
        </div>
        <div><div class="name" id="sidebarName">张管理</div><div class="role" id="sidebarRole">耗材管理员</div></div>
      </div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="breadcrumb">🏠 首页 / <span id="breadcrumb">工作台</span></div>
      <div class="spacer"></div>
      <div class="topbar-action">
        <button class="icon-btn" onclick="checkNotifications()">🔔<span class="dot" id="notifyDot"></span></button>
      </div>
      <div class="topbar-action">
        <button class="icon-btn" onclick="navTo('settings')">👤</button>
      </div>
      <div class="topbar-action">
        <button class="icon-btn" onclick="doLogout()" title="退出登录" style="font-size:18px">⏻</button>
      </div>
    </header>

    <main class="main-content" id="mainContent">
      <!-- Pages will be injected here -->
    </main>
  </div>
</div>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle">提示</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// API CONFIG
// ═══════════════════════════════════════════
const API_BASE = '';  // 同源部署，无需跨域
const api = {
  token: localStorage.getItem('token') || '',
  async fetch(url, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...opts.headers };
    if (api.token) headers['Authorization'] = `Bearer ${api.token}`;
    const res = await fetch(API_BASE + url, { ...opts, headers });
    if (res.status === 401) { api.token = ''; localStorage.removeItem('token'); document.getElementById('loginPage').classList.remove('hidden'); document.getElementById('appLayout').classList.remove('active'); throw new Error('登录已过期'); }
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${res.status}`); }
    return res.json();
  },
  get: url => api.fetch(url),
  post: (url, data) => api.fetch(url, { method: 'POST', body: JSON.stringify(data) }),
  put: (url, data) => api.fetch(url, { method: 'PUT', body: JSON.stringify(data) }),
  del: url => api.fetch(url, { method: 'DELETE' }),
};

const state = {
  user: null,
  currentPage: 'dashboard',
  sidebarOpen: false,
};

function doLogout() {
  api.token = '';
  localStorage.removeItem('token');
  document.getElementById('appLayout').classList.remove('active');
  document.getElementById('loginPage').classList.remove('hidden');
  showToast('已退出登录');
}

// LOGIN
// ═══════════════════════════════════════════
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (!u || !p) { showToast('请输入用户名和密码','error'); return; }
  try {
    const res = await api.post('/api/auth/login', { username: u, password: p });
    api.token = res.access_token;
    localStorage.setItem('token', res.access_token);
    state.user = { ...res.user, roleType: res.user.role, username: res.user.username, name: res.user.real_name, avatar: res.user.avatar_initials || res.user.real_name[0] };
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appLayout').classList.add('active');
    const sidebarImg = document.getElementById('sidebarAvatarImg');
    if (sidebarImg) { sidebarImg.src = '/api/auth/avatar/' + state.user.id + '?t=' + Date.now(); }
    document.getElementById('sidebarAvatarText').textContent = state.user.avatar;
    document.getElementById('sidebarName').textContent = state.user.name;
    document.getElementById('sidebarRole').textContent = {admin:'耗材管理员',teacher:'实验实训教师',approver:'系部负责人',sysadmin:'系统管理员'}[state.user.role] || '';
    navTo('dashboard');
    showToast(`欢迎回来，${state.user.name}`,'success');
  } catch(e) {
    showToast(e.message || '登录失败','error');
  }
}

function navTo(page, el) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = el || document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navItem) navItem.classList.add('active');
  document.getElementById('breadcrumb').textContent = breadcrumbs[page] || page;
  renderPage(page);
  if (window.innerWidth <= 768) closeSidebar();
}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  if (state.sidebarOpen) { sb.classList.add('open'); ov.classList.add('show'); }
  else { sb.classList.remove('open'); ov.classList.remove('show'); }
}

function closeSidebar() {
  state.sidebarOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ─── 导出工具函数 ───
function getDates(btn) {
  // 从同一卡片中获取开始/结束日期
  const card = btn.closest('.card-body');
  const inputs = card.querySelectorAll('input[type="date"]');
  const params = [];
  if (inputs[0] && inputs[0].value) params.push(`start_date=${inputs[0].value}`);
  if (inputs[1] && inputs[1].value) params.push(`end_date=${inputs[1].value}`);
  return params.length ? '?' + params.join('&') : '';
}

async function exportExcel(url, params) {
  try {
    const token = localStorage.getItem('token');
    const fullUrl = url + (params || '');
    const resp = await fetch(fullUrl, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!resp.ok) {
      const err = await resp.json();
      showToast(err.detail || '导出失败', 'error');
      return;
    }
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const disposition = resp.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename\*=UTF-8''(.+)/);
    a.download = match ? decodeURIComponent(match[1]) : 'export.xlsx';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('导出成功', 'success');
  } catch (e) {
    showToast('导出失败: ' + e.message, 'error');
  }
}

function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {success:'✅',error:'❌',warning:'⚠️'};
  t.innerHTML = `<span>${icons[type]||'📢'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

async function updateDashboardTables() {
  try {
    const reqs = await api.get('/api/requisitions?page_size=5');
    if (reqs.items) {
      document.getElementById('stat-pending').textContent = reqs.items.filter(r => r.status === 'pending').length;
      document.getElementById('dashRecentOrders').innerHTML = `<table><thead><tr><th>申请编号</th><th>申请人</th><th>用途</th><th>金额</th><th>状态</th></tr></thead>
      <tbody>${reqs.items.map(r => `<tr><td>${r.req_code}</td><td>${r.applicant_name}</td><td>${r.purpose}</td><td>¥${parseFloat(r.total_amount).toFixed(2)}</td><td><span class="badge badge-${r.status==='pending'?'warning':r.status==='approved'?'info':r.status==='signed'?'success':'info'}">${statusLabel(r.status)}</span></td></tr>`).join('')}</tbody></table>`;
    }
    // 库存预警 - 同时加载低库存和高库存
    const [lowMats, highMats] = await Promise.all([
      api.get('/api/materials?alert_status=low&page_size=10'),
      api.get('/api/materials?alert_status=high&page_size=10')
    ]);
    const alertTbody = document.querySelector('#dashAlerts tbody');
    if (!alertTbody) return;
    const alertItems = [...(lowMats.items||[]), ...(highMats.items||[])];
    if (alertItems.length > 0) {
      alertTbody.innerHTML = alertItems.map(m => {
        const isLow = m.alert_status === 'low';
        return `<tr><td>${m.material_code}</td><td>${m.name} ${m.spec}</td>
          <td class="${isLow?'text-danger':'text-warning'}">${m.stock_qty}${m.unit}</td><td>${isLow ? (m.safety_stock_min||'-') : (m.safety_stock_max||'-')}</td>
          <td><span class="badge ${isLow?'badge-danger':'badge-warning'}">${isLow?'低库存':'高库存'}</span></td></tr>`;
      }).join('');
    } else {
      alertTbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-light);padding:16px">暂无预警</td></tr>';
    }
    // 图表 - 用真实数据
    updateDashboardCharts();
  } catch(e) { console.warn('Dashboard update failed:', e); }
}

// 真实消耗趋势数据
async function updateDashboardCharts() {
  try {
    const [mats, consumption] = await Promise.all([
      api.get('/api/materials?page_size=100'),
      api.get('/api/reports/consumption?months=6')
    ]);
    if (!mats.items || !_chartCategory) return;
    // 类别占比
    const catCount = {};
    mats.items.forEach(m => {
      const cat = (m.category_name || '其他') + '';
      catCount[cat] = (catCount[cat] || 0) + 1;
    });
    const catNames = Object.keys(catCount).slice(0, 8);
    _chartCategory.data.labels = catNames;
    _chartCategory.data.datasets[0].data = catNames.map(k => catCount[k]);
    _chartCategory.update();

    // 消耗趋势 - 真实数据
    if (consumption && _chartConsumption) {
      _chartConsumption.data.labels = consumption.map(c => c.month);
      _chartConsumption.data.datasets = [
        { label: '领用次数', data: consumption.map(c => c.order_count), backgroundColor: '#2E75B6' },
        { label: '金额(元)', data: consumption.map(c => c.total_amount), backgroundColor: '#E74C3C', yAxisID: 'y1' }
      ];
      _chartConsumption.update();
    }
  } catch(e) { console.warn('Chart update:', e); }
}

async function submitInbound() {
  const fields = ['ibName','ibSpec','ibQty','ibPrice'];
  for (const id of fields) {
    const el = document.getElementById(id);
    if (!el || !el.value) { showToast('请填写必填字段','error'); if(el) el.focus(); return; }
  }
  try {
    const matName = document.getElementById('ibName').value;
    const matSpec = document.getElementById('ibSpec').value;
    const catName = document.getElementById('ibCategory')?.value || '电子元器件';
    const supName = document.getElementById('ibSupplier')?.value || '';
    const catId = _catMap[catName] || 1;
    const supId = _supMap[supName] || (Object.values(_supMap)[0]) || 1;

    // Check if material exists
    let matId = null;
    const mats = await api.get(`/api/materials?keyword=${encodeURIComponent(matName)}&page_size=10`);
    if (mats.items) {
      const found = mats.items.find(m => m.name === matName && m.spec === matSpec);
      if (found) matId = found.id;
    }

    // Create material if not found
    if (!matId) {
      const newMat = await api.post('/api/materials', {
        name: matName, spec: matSpec, category_id: catId,
        unit: document.getElementById('ibUnit').value,
        unit_price: parseFloat(document.getElementById('ibPrice').value) || 0,
        location: document.getElementById('ibLocation')?.value || '',
        supplier_id: supId,
        fund_source: document.getElementById('ibFund')?.value || '',
        remark: document.getElementById('ibRemark')?.value || ''
      });
      matId = newMat.material_id || newMat.id;
      if (!matId) {
        // Retry: search again
        const retry = await api.get(`/api/materials?keyword=${encodeURIComponent(matName)}&page_size=10`);
        const found = (retry.items||[]).find(m => m.name === matName && m.spec === matSpec);
        matId = found?.id;
      }
      if (!matId) { showToast('耗材创建失败，请重试','error'); return; }
    }

    // Create inbound record
    await api.post('/api/inbound-records', {
      material_id: matId,
      batch_no: document.getElementById('ibBatch')?.value || ('PO' + new Date().toISOString().slice(0,10).replace(/-/g,'')),
      quantity: parseInt(document.getElementById('ibQty').value),
      unit_price: parseFloat(document.getElementById('ibPrice').value),
      supplier_id: supId,
      purchase_date: document.getElementById('ibDate')?.value || new Date().toISOString().slice(0,10),
      fund_source: document.getElementById('ibFund')?.value || '',
      remark: document.getElementById('ibRemark')?.value || ''
    });
    showToast('入库成功！','success');
    resetInbound();
  } catch(e) {
    showToast('入库失败：' + e.message, 'error');
  }
}

function resetInbound() {
  ['ibName','ibSpec','ibQty','ibPrice','ibBatch','ibDate','ibLocation','ibFund','ibRemark'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

let _materialCache = [];

async function loadMaterialCache() {
  try {

      id: m.id, name: m.name, spec: m.spec,

function materialOptions() {

function addApplyItem() {
  const tbody = document.getElementById('applyItems');

  tr.innerHTML = `

  `;
  tbody.appendChild(tr);
  // 触发默认选中项的规格填充
  const sel = tr.querySelector('select');
  if (sel) onMaterialSelect(sel);
}

function filterMaterialOptions(input) {
  const kw = input.value.toLowerCase();
  const sel = input.parentElement.querySelector('select');
  if (!sel) return;
  // 重新加载全部选项
  sel.innerHTML = '<option value="">— 请选择耗材 —</option>' + materialOptions();
  if (kw) {
    sel.querySelectorAll('option').forEach(o => {
      if (o.value && !o.textContent.toLowerCase().includes(kw)) o.style.display = 'none';
    });
  }
}

function onMaterialSelect(sel) {
  const opt = sel.selectedOptions[0];
  const tr = sel.closest('tr');
  const specInput = tr.querySelectorAll('input')[0];
  const stockSpan = tr.querySelector('span[style]');
  if (opt && specInput) {
    specInput.value = opt.dataset.spec || '';
    if (stockSpan && opt.dataset.stock) {
      stockSpan.textContent = opt.dataset.stock + ' ' + (opt.dataset.unit || '');
    }
  }
}

async function submitApply() {
  const purpose = document.getElementById('apPurpose')?.value;
  if (!purpose) { showToast('请填写用途说明','error'); return; }
  const tbody = document.getElementById('applyItems');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  const items = [];
  const matNameMap = {};
  // Build material map
  try {
    const mats = await api.get('/api/materials?page_size=100');
    (mats.items || []).forEach(m => { matNameMap[m.name] = m.id; });
  } catch(e) {}
  for (const row of rows) {
    const sel = row.querySelector('select')?.value;
    const qty = row.querySelector('input[type="number"]')?.value;
    if (sel && qty && parseInt(qty) > 0) {
      const mid = matNameMap[sel];
      if (mid) items.push({ material_id: mid, req_quantity: parseInt(qty) });
    }
  }
  if (items.length === 0) { showToast('请至少添加一项耗材明细','error'); return; }
  try {
    await api.post('/api/requisitions', {
      purpose, items,
      use_date: document.getElementById('apDate')?.value || null
    });
    showToast('领用申请已提交，请等待审批','success');
    // 实时更新审批角标
    updateApproveBadge();
  } catch(e) {
    showToast('提交失败：' + e.message, 'error');
  }
}

// ─── 报表预览/勾选导出逻辑 ───
async function loadReportPreview(cardId) {
  const rc = reportCards.find(c => c.id === cardId);
  if (!rc) return;
  const previewDiv = document.getElementById('preview-' + cardId);
  const tbody = document.getElementById('tbody-' + cardId);
  const thead = document.getElementById('thead-' + cardId);

  // 切换显示/隐藏
  if (previewDiv.style.display === 'block') {
    previewDiv.style.display = 'none';
    return;
  }
  previewDiv.style.display = 'block';
  tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-light);padding:24px">加载中...</td></tr>';

  try {
    const res = await api.get(rc.api);
    const items = res.items || [];
    const labels = Object.keys(rc.cols);   // 中文表头: ['序号','入库单号',...]
    const fields = Object.values(rc.cols); // 字段名: ['idx','inbound_code',...]

    // 表头
    thead.innerHTML = `<tr><th style="width:36px"><input type="checkbox" onchange="toggleAllReport('${cardId}', this.checked)"></th>${labels.map(l => `<th>${l}</th>`).join('')}</tr>`;

    // 数据行
    tbody.innerHTML = items.map((item, idx) => {
      const vals = fields.map(f => {
        if (f === 'idx') return idx + 1;
        const v = item[f];
        if (f === 'unit_price' || f === 'total_amount' || f === 'stock_value' || f === 'total_amount') return v != null ? (typeof v === 'number' ? v.toFixed(2) : v) : '';
        if (f === 'order_count') return v || 0;
        if (f === 'alert_status') return v === 'low' ? '⚠️低' : v === 'high' ? '📈高' : '正常';
        if (f === 'status') return v ? statusLabel(v) : '';
        if (f === 'quantity') return v || '';
        if (f === 'inbound_date' || f === 'created_at') return v ? v.slice(0, 10) : '';
        return v ?? '';
      });
      return `<tr><td><input type="checkbox" class="rpt-check-${cardId}" value="${item[rc.idField]}"></td>${vals.map(v => `<td>${v}</td>`).join('')}</tr>`;
    }).join('');

    document.getElementById('count-' + cardId).textContent = `共 ${items.length} 条记录`;
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--danger);padding:16px">加载失败: ${e.message}</td></tr>`;
  }
}

function toggleAllReport(cardId, checked) {
  document.querySelectorAll('.rpt-check-' + cardId).forEach(cb => cb.checked = checked);
}

function selectAllReport(cardId) {
  document.querySelectorAll('.rpt-check-' + cardId).forEach(cb => cb.checked = true);
}

function deselectAllReport(cardId) {
  document.querySelectorAll('.rpt-check-' + cardId).forEach(cb => cb.checked = false);
}

function exportSelectedReport(cardId) {
  const checks = document.querySelectorAll('.rpt-check-' + cardId + ':checked');
  if (checks.length === 0) {
    showToast('请至少勾选一条记录', 'warning');
    return;
  }
  const ids = Array.from(checks).map(cb => cb.value).join(',');
  const rc = reportCards.find(c => c.id === cardId);
  const url = rc.exportApi + '?ids=' + encodeURIComponent(ids);
  exportExcel(url);
}

        <div>
          <div style="font-size:20px;font-weight:700" id="profileName">${state.user?.name||'—'}</div>
          <div style="font-size:13px;color:var(--text-light)">${state.user?.role||'—'} · zachary</div>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>用户名</label><input type="text" id="setUsername" value="${state.user?.username||''}"></div>
        <div class="form-group"><label>姓名</label><input type="text" id="setRealname" value="${state.user?.name||''}"></div>
        <div class="form-group"><label>手机号</label><input type="text" id="setPhone" value="${state.user?.phone||''}"></div>
        <div class="form-group"><label>邮箱</label><input type="email" id="setEmail" value="${state.user?.email||''}"></div>
        <div class="form-group"><label>新密码</label><input type="password" id="setNewPwd" placeholder="留空不修改"></div>
        <div class="form-group"><label>确认新密码</label><input type="password" id="setNewPwd2" placeholder="留空不修改"></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="updateProfile()">💾 保存修改</button></div>
    </div></div>
  </div>

  <div class="tab-content" id="tab-approval-rules">
    <div class="card"><div class="card-body" id="configForm"><p style="color:var(--text-light)">加载中...</p></div></div>
  </div>

  <div class="tab-content" id="tab-users">
    <div class="card"><div class="card-body no-padding">
      <div class="toolbar" style="padding:12px 16px;display:flex;gap:12px">
        <button class="btn btn-primary btn-sm" onclick="showAddUserModal()">+ 新增用户</button>
      </div>
      <div class="table-wrap"><table><thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>电话</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="userTableBody"><tr><td colspan="6" style="text-align:center;color:var(--text-light);padding:20px">加载中...</td></tr></tbody></table></div>
    </div></div>
  </div>
</div>`;
}

// ─── 头像上传 ───
async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  try {
    const token = api.token;
    const resp = await fetch('/api/auth/avatar', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form });
    if (!resp.ok) throw new Error((await resp.json()).detail || '上传失败');
    const data = await resp.json();
    // 刷新显示
    const img = document.getElementById('profileAvatarImg');
    img.src = data.avatar_url + '?t=' + Date.now();
    img.style.display = '';
    document.getElementById('profileAvatarText').style.display = 'none';
    // 同步侧边栏
    const sidebarImg = document.getElementById('sidebarAvatarImg');
    if (sidebarImg) {
      sidebarImg.src = data.avatar_url + '?t=' + Date.now();
      sidebarImg.style.display = '';
      document.getElementById('sidebarAvatarText').style.display = 'none';
    }
    showToast('头像已更新','success');
  } catch(e) { showToast('上传失败：' + e.message, 'error'); }
}

// ─── 个人资料 ───
async function updateProfile() {
  const pwd = document.getElementById('setNewPwd')?.value;
  const pwd2 = document.getElementById('setNewPwd2')?.value;
  if (pwd && pwd !== pwd2) { showToast('两次密码不一致','error'); return; }
  try {
    const params = [];
    const username = document.getElementById('setUsername')?.value;
    const realname = document.getElementById('setRealname')?.value;
    const phone = document.getElementById('setPhone')?.value;
    const email = document.getElementById('setEmail')?.value;
    if (username) params.push('username=' + encodeURIComponent(username));
    if (realname) params.push('real_name=' + encodeURIComponent(realname));
    if (phone) params.push('phone=' + encodeURIComponent(phone));
    if (email) params.push('email=' + encodeURIComponent(email));
    if (pwd) params.push('new_password=' + encodeURIComponent(pwd));
    const url = '/api/auth/profile?' + params.join('&');
    const res = await api.put(url);
    if (res.user) {
      state.user = { ...state.user, ...res.user, name: res.user.real_name, avatar: res.user.avatar_initials || res.user.real_name[0] };
      document.getElementById('profileAvatarText').textContent = state.user.avatar;
      document.getElementById('profileName').textContent = state.user.name;
      document.getElementById('sidebarAvatarText').textContent = state.user.avatar;
      document.getElementById('sidebarName').textContent = state.user.name;
    }
    document.getElementById('setNewPwd').value = '';
    document.getElementById('setNewPwd2').value = '';
    showToast('个人资料已更新','success');
  } catch(e) { showToast('保存失败：' + e.message, 'error'); }
}

// ─── 审批规则 / 预警参数 ───
async function loadConfig() {
  try {
    const cfg = await api.get('/api/config');
    document.getElementById('configForm').innerHTML = `
      <h4 style="margin-bottom:12px">审批规则</h4>
      <div class="form-grid">
        <div class="form-group"><label>自动审批阈值（元）</label><input type="number" id="cfgAutoApprove" value="${cfg.auto_approve_threshold}" step="0.01"><small>低于此金额自动审批</small></div>
      </div>
      <h4 style="margin:20px 0 12px">归还规则</h4>
      <div class="form-grid">
        <div class="form-group"><label>逾期罚款（元/天）</label><input type="number" id="cfgFineRate" value="${cfg.return_fine_rate}" step="0.01"></div>
        <div class="form-group"><label>最长借用天数</label><input type="number" id="cfgMaxDays" value="${cfg.return_max_borrow_days}"></div>
        <div class="form-group"><label>损坏赔偿比例</label><input type="number" id="cfgDamageRate" value="${cfg.return_damage_rate}" step="0.01" max="1"></div>
        <div class="form-group"><label>丢失赔偿比例</label><input type="number" id="cfgLossRate" value="${cfg.return_loss_rate}" step="0.01" max="1"></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button></div>`;
  } catch(e) { showToast('加载配置失败','error'); }
}

async function saveConfig() {
  try {
    const data = {
      auto_approve_threshold: parseFloat(document.getElementById('cfgAutoApprove')?.value)||0,
      return_fine_rate: parseFloat(document.getElementById('cfgFineRate')?.value)||0,
      return_max_borrow_days: parseInt(document.getElementById('cfgMaxDays')?.value)||30,
      return_damage_rate: parseFloat(document.getElementById('cfgDamageRate')?.value)||0,
      return_loss_rate: parseFloat(document.getElementById('cfgLossRate')?.value)||0,
    };
    await api.put('/api/config', data);
    showToast('配置已保存','success');
  } catch(e) { showToast('保存失败','error'); }
}

// ─── 用户管理 ───
async function loadUserList() {
  try {
    const res = await api.get('/api/users?page_size=50');
    const items = res.items || [];
    const roles = {admin:'耗材管理员',teacher:'教师',approver:'审批人',sysadmin:'系统管理员'};
    document.getElementById('userTableBody').innerHTML = items.map(u => `<tr>
      <td>${u.username}</td><td>${u.real_name}</td><td>${roles[u.role]||u.role}</td><td>${u.phone||''}</td>
      <td><span class="badge ${u.status===1?'badge-success':'badge-default'}">${u.status===1?'正常':'已停用'}</span></td>
      <td><div class="btn-group">
        <button class="btn btn-ghost btn-xs" onclick="toggleUser(${u.id})">${u.status===1?'停用':'启用'}</button>
        <button class="btn btn-ghost btn-xs" onclick="showResetPwdModal(${u.id},'${u.username}')">改密</button>
      </div></td>
    </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-light);padding:20px">暂无用户</td></tr>';
  } catch(e) { showToast('仅系统管理员可管理用户','error'); }
}

function showAddUserModal() {
  openModal('新增用户',
    `<div class="form-grid">
      <div class="form-group"><label>用户名 *</label><input type="text" id="newUsername"></div>
      <div class="form-group"><label>姓名 *</label><input type="text" id="newRealname"></div>
      <div class="form-group"><label>角色</label><select id="newRole"><option value="teacher">教师</option><option value="approver">审批人</option><option value="admin">管理员</option></select></div>
      <div class="form-group"><label>密码 *</label><input type="password" id="newPwd"></div>
      <div class="form-group"><label>手机</label><input type="text" id="newPhone"></div>
      <div class="form-group"><label>邮箱</label><input type="text" id="newEmail"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="createUser()">创建</button>`
  );
}

async function createUser() {
  try {
    await api.post('/api/users', {
      username: document.getElementById('newUsername')?.value,
      real_name: document.getElementById('newRealname')?.value,
      role: document.getElementById('newRole')?.value,
      password: document.getElementById('newPwd')?.value,
      phone: document.getElementById('newPhone')?.value,
      email: document.getElementById('newEmail')?.value,
    });
    closeModal();
    showToast('用户创建成功','success');
    loadUserList();
  } catch(e) { showToast('创建失败：'+e.message,'error'); }
}

async function toggleUser(uid) {
  try {
    await api.put(`/api/users/${uid}/toggle-status`);
    showToast('操作成功','success');
    loadUserList();
  } catch(e) { showToast('操作失败：'+e.message,'error'); }
}

function showResetPwdModal(uid, uname) {
  openModal(`重置密码 - ${uname}`,
    `<div class="form-group"><label>新密码</label><input type="password" id="resetPwd" placeholder="至少4位"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="resetUserPwd(${uid})">确认</button>`
  );
}

async function resetUserPwd(uid) {
  try {
    await api.put(`/api/users/${uid}/reset-password`, { new_password: document.getElementById('resetPwd')?.value });
    closeModal();
    showToast('密码已重置','success');
  } catch(e) { showToast('重置失败：'+e.message,'error'); }
}
